services:
  postgres:
    image: postgres:17-alpine
    container_name: mediapp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mediappbd}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bar2005XP}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: mediapp-keycloak
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-bar2005XP}
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "${KEYCLOAK_PORT:-9595}:8080"
    volumes:
      - ./docker/keycloak/import:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
    container_name: mediapp-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mediappbd}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-bar2005XP}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:${KEYCLOAK_PORT:-9595}/realms/mediapp
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/mediapp/protocol/openid-connect/certs
      KEYCLOAK_ADMIN_SERVER_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_REALM: mediapp
      KEYCLOAK_ADMIN_CLIENT_ID: mediapp-backend
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_MEDIAPP_BACKEND_SECRET:-sNZ7TT49tV8kJyxEcfH2zboBJq4llxNj}
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_MEDIAPP_ADMIN_USERNAME:-mitotest21@gmail.com}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_MEDIAPP_ADMIN_PASSWORD:-123}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

volumes:
  postgres_data:
